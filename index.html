<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Voice Camera Pro (Phone & PC)</title>
  
  <!-- โหลด Library AI -->
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  
  <style>
    /* การออกแบบหน้าจอให้รองรับทั้ง PC และ Phone */
    body { 
      margin: 0; background: #000; color: #fff; text-align: center; 
      font-family: sans-serif; display: flex; flex-direction: column; 
      height: 100vh; overflow: hidden;
    }

    #startOverlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: #0044cc; z-index: 999; display: flex; align-items: center; 
      justify-content: center; cursor: pointer; text-align: center;
    }

    #status { 
      font-size: clamp(20px, 4vw, 30px); padding: 10px; height: 10vh; 
      background: #1a1a1a; color: #ffff00; font-weight: bold; 
      display: flex; align-items: center; justify-content: center;
      border-bottom: 2px solid #333;
    }

    .video-area { 
      flex: 1; position: relative; background: #222; display: flex; justify-content: center; align-items: center;
    }

    video { 
      max-width: 100%; max-height: 100%; object-fit: contain; transform: scaleX(-1); 
    }

    .controls { 
      height: 35vh; background: #111; display: grid; 
      grid-template-columns: 1fr; gap: 10px; padding: 15px; box-sizing: border-box;
    }

    .btn { 
      width: 100%; height: 100%; font-size: clamp(22px, 5vw, 32px); 
      font-weight: bold; border: none; border-radius: 20px; color: white; 
      cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    #photoBtn { background: #28a745; }
    #videoBtn { background: #dc3545; }
    #stopBtn { background: #ffc107; color: #000; display: none; }

    /* ปุ่มจะจางเมื่อ AI ยังหาหน้าไม่เจอ เพื่อให้รู้ว่ากดไม่ได้ */
    .disabled { opacity: 0.3; pointer-events: none; }

    @media (min-width: 768px) {
      /* ปรับแต่งสำหรับหน้าจอ PC */
      .controls { grid-template-columns: 1fr 1fr; height: 20vh; }
      video { height: 70vh; }
    }
  </style>
</head>
<body>

<div id="startOverlay" onclick="startApp()">
  <div>
    <h1 style="font-size: 45px;">แตะหน้าจอเพื่อเริ่ม</h1>
    <p style="font-size: 22px;">(TAP TO START)</p>
  </div>
</div>

<div id="status">กำลังรอเปิดระบบ...</div>

<div class="video-area">
  <video id="video" autoplay muted playsinline></video>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<div class="controls">
  <button id="photoBtn" class="btn disabled" onclick="takePhoto()">📷 ถ่ายรูป (Photo)</button>
  <button id="videoBtn" class="btn disabled" onclick="startVideoRecord()">🎥 อัดวิดีโอ (Video)</button>
  <button id="stopBtn" class="btn" onclick="stopVideoRecord()">⏹ หยุดและบันทึก (Stop)</button>
</div>

<script>
const video = document.getElementById('video');
const statusText = document.getElementById('status');
const startOverlay = document.getElementById('startOverlay');
const photoBtn = document.getElementById('photoBtn');
const videoBtn = document.getElementById('videoBtn');
const stopBtn = document.getElementById('stopBtn');

let modelsLoaded = false;
let mediaRecorder;
let recordedChunks = [];
let isRecording = false;

// ระบบเสียงภาษาไทย (Thai Speech)
function speak(text) {
  if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = 'th-TH';
  msg.rate = 1.1; 
  window.speechSynthesis.speak(msg);
}

// เริ่มเปิดกล้องและโหลด AI
async function startApp() {
  startOverlay.style.display = 'none';
  statusText.innerText = "กำลังเชื่อมต่อกล้อง...";
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'user' }, 
      audio: true 
    });
    video.srcObject = stream;
    
    statusText.innerText = "โหลด AI...";
    speak("กำลังโหลดเอไอค่ะ");
    
    // โหลด Model (ใช้ Tiny ตัวที่เล็กและเร็วที่สุด)
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    modelsLoaded = true;
    
    speak("เอไอพร้อมแล้ว ส่องหน้ามาที่กล้องได้เลยค่ะ");
    detect();
  } catch (err) {
    statusText.innerText = "ไม่สามารถเปิดกล้องได้";
    speak("เปิดกล้องไม่ได้ โปรดอนุญาตสิทธิ์ค่ะ");
  }
}

// ระบบ AI ตรวจจับตำแหน่งใบหน้า
async function detect() {
  if (!modelsLoaded || isRecording) {
    setTimeout(detect, 200);
    return;
  }

  // ปรับ inputSize เป็น 128 เพื่อให้รันบนมือถือได้ลื่นไหล (Fast for Mobile)
  const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 128, scoreThreshold: 0.5 });
  const result = await faceapi.detectSingleFace(video, options);

  if (result) {
    const x = result.box.x + (result.box.width / 2);
    const w = video.videoWidth;
    
    if (x < w * 0.35) { 
      statusText.innerText = "ขยับขวา (Move Right)";
      speak("ขยับขวา"); 
      setButtonsEnabled(false);
    } else if (x > w * 0.65) { 
      statusText.innerText = "ขยับซ้าย (Move Left)";
      speak("ขยับซ้าย"); 
      setButtonsEnabled(false);
    } else { 
      statusText.innerText = "ตรงกลางแล้ว (Centered)"; 
      speak("ตรงกลางแล้ว"); 
      setButtonsEnabled(true);
      if(navigator.vibrate) navigator.vibrate(100);
    }
  } else {
    statusText.innerText = "ไม่พบใบหน้า (Face not found)";
    setButtonsEnabled(false);
  }
  setTimeout(detect, 400); // หน่วงเวลาเล็กน้อยเพื่อประหยัดแบตเตอรี่และไม่ให้เครื่องร้อน
}

function setButtonsEnabled(enabled) {
  if (enabled) {
    photoBtn.classList.remove('disabled');
    videoBtn.classList.remove('disabled');
  } else {
    photoBtn.classList.add('disabled');
    videoBtn.classList.add('disabled');
  }
}

// ฟังก์ชันถ่ายรูปนิ่ง
function takePhoto() {
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  // Mirror Correction
  ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0);
  
  const link = document.createElement('a');
  link.download = `photo_${Date.now()}.jpg`;
  link.href = canvas.toDataURL('image/jpeg');
  link.click();
  speak("บันทึกรูปภาพเรียบร้อยค่ะ");
}

// ฟังก์ชันอัดวิดีโอ
function startVideoRecord() {
  isRecording = true;
  recordedChunks = [];
  speak("เริ่มอัดวิดีโอ");
  
  photoBtn.style.display = 'none';
  videoBtn.style.display = 'none';
  stopBtn.style.display = 'block';
  
  mediaRecorder = new MediaRecorder(video.srcObject);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const link = document.createElement('a');
    link.download = `video_${Date.now()}.webm`;
    link.href = URL.createObjectURL(blob);
    link.click();
    speak("บันทึกวิดีโอเรียบร้อยค่ะ");
    
    isRecording = false;
    stopBtn.style.display = 'none';
    photoBtn.style.display = 'block';
    videoBtn.style.display = 'block';
  };
  mediaRecorder.start();
}

function stopVideoRecord() {
  if (mediaRecorder) mediaRecorder.stop();
}
</script>
</body>
</html>
