<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Camera Helper Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <style>
    body { margin: 0; background: #000; color: #fff; text-align: center; font-family: sans-serif; overflow: hidden; }
    
    /* หน้าจอเริ่มต้น */
    #startOverlay { 
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
      background: #0044cc; z-index: 999; display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: pointer;
    }

    #status { 
      font-size: 28px; padding: 15px; height: 15vh; background: #1a1a1a; 
      color: #ffff00; font-weight: bold; display: flex; align-items: center; 
      justify-content: center; border-bottom: 3px solid #333; 
    }

    .video-wrap { position: relative; width: 100%; height: 50vh; background: #000; }
    video { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }

    .controls { height: 35vh; display: flex; flex-direction: column; justify-content: center; padding: 10px; gap: 15px; }

    .btn { 
      width: 90%; height: 90px; font-size: 32px; font-weight: bold; 
      border: none; border-radius: 45px; color: white; display: none; margin: 0 auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
    }

    #photoBtn { background: #28a745; }
    #videoBtn { background: #dc3545; }
    #stopBtn { background: #ffc107; color: #000; }
  </style>
</head>
<body>

<div id="startOverlay" onclick="startApp()">
  <h1 style="font-size: 45px;">แตะหน้าจอเพื่อเริ่ม</h1>
  <p style="font-size: 22px;">(TAP TO START)</p>
</div>

<div id="status">กรุณากดปุ่มเพื่อเริ่ม</div>

<div class="video-wrap">
  <video id="video" autoplay muted playsinline></video>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<div class="controls">
  <button id="photoBtn" class="btn" onclick="takePhoto()">📷 ถ่ายรูป</button>
  <button id="videoBtn" class="btn" onclick="startVideoRecord()">🎥 อัดวิดีโอ</button>
  <button id="stopBtn" class="btn" onclick="stopVideoRecord()">⏹ หยุดและบันทึก</button>
</div>

<script>
const video = document.getElementById('video');
const statusText = document.getElementById('status');
const startOverlay = document.getElementById('startOverlay');
const photoBtn = document.getElementById('photoBtn');
const videoBtn = document.getElementById('videoBtn');
const stopBtn = document.getElementById('stopBtn');

let modelsLoaded = false;
let mediaRecorder;
let recordedChunks = [];
let isRecording = false;
let noFaceCounter = 0; // ตัวนับเมื่อไม่เจอหน้า

// ระบบเสียงภาษาไทย (ปรับปรุงให้นิ่งขึ้น)
function speak(text) {
  if (window.speechSynthesis.speaking && text !== "ตรงกลางแล้วค่ะ") return; 
  window.speechSynthesis.cancel(); // หยุดเสียงเก่าทันทีเพื่อพูดประโยคใหม่
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = 'th-TH';
  msg.rate = 1.1; 
  window.speechSynthesis.speak(msg);
}

// เริ่มระบบ
async function startApp() {
  startOverlay.style.display = 'none';
  statusText.innerText = "กำลังเชื่อมต่อกล้อง...";
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }, 
      audio: true 
    });
    video.srcObject = stream;
    
    statusText.innerText = "กำลังโหลด AI...";
    speak("กำลังโหลดเอไอค่ะ");
    
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
    await faceapi.loadTinyFaceDetectorModel(MODEL_URL);
    modelsLoaded = true;
    
    speak("เอไอพร้อมแล้ว ส่องกล้องมาที่หน้าได้เลยค่ะ");
    
    // เริ่มระบบตรวจจับ
    detect();
  } catch (err) {
    statusText.innerText = "เข้าถึงกล้องไม่ได้";
    speak("ไม่สามารถเปิดกล้องได้ โปรดอนุญาตสิทธิ์ค่ะ");
  }
}

async function detect() {
  if (!modelsLoaded || isRecording) {
    setTimeout(detect, 100);
    return;
  }

  // ปรับค่าเซนเซอร์: inputSize 160 = เร็วและแม่นพอดีสำหรับมือถือ
  const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.5 });
  const detection = await faceapi.detectSingleFace(video, options);

  if (detection) {
    noFaceCounter = 0;
    const box = detection.box;
    const x = box.x + (box.width / 2);
    const w = video.videoWidth;
    
    // ตรวจสอบตำแหน่ง
    if (x < w * 0.35) { 
      statusText.innerText = "ขยับมือถือไปทางขวา";
      speak("ขยับขวา"); 
      toggleButtons(false);
    } else if (x > w * 0.65) { 
      statusText.innerText = "ขยับมือถือไปทางซ้าย";
      speak("ขยับซ้าย"); 
      toggleButtons(false);
    } else { 
      statusText.innerText = "ใบหน้าอยู่ตรงกลางแล้ว"; 
      speak("ตรงกลางแล้วค่ะ"); 
      toggleButtons(true);
      if(navigator.vibrate) navigator.vibrate(100);
    }
  } else {
    noFaceCounter++;
    // ถ้าไม่เจอหน้าติดต่อกัน 3 รอบ (ประมาณ 1.5 วินาที)
    if (noFaceCounter > 3) {
      statusText.innerText = "ไม่พบใบหน้าในกรอบ";
      speak("ไม่พบใบหน้าค่ะ");
      toggleButtons(false);
      noFaceCounter = 0; // รีเซ็ตเพื่อไม่ให้พูดรัว
    }
  }

  // วนลูปตรวจจับต่อ
  setTimeout(detect, 500); 
}

function toggleButtons(show) {
  const display = show ? 'block' : 'none';
  if (!isRecording) {
    photoBtn.style.display = display;
    videoBtn.style.display = display;
  }
}

function takePhoto() {
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0);
  
  const link = document.createElement('a');
  link.download = `photo_${Date.now()}.jpg`;
  link.href = canvas.toDataURL('image/jpeg');
  link.click();
  speak("บันทึกรูปภาพสำเร็จค่ะ");
}

function startVideoRecord() {
  isRecording = true;
  recordedChunks = [];
  speak("เริ่มอัดวิดีโอ");
  photoBtn.style.display = 'none';
  videoBtn.style.display = 'none';
  stopBtn.style.display = 'block';
  
  mediaRecorder = new MediaRecorder(video.srcObject);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const link = document.createElement('a');
    link.download = `video_${Date.now()}.webm`;
    link.href = URL.createObjectURL(blob);
    link.click();
    speak("บันทึกวิดีโอเรียบร้อยค่ะ");
  };
  mediaRecorder.start();
}

function stopVideoRecord() {
  mediaRecorder.stop();
  isRecording = false;
  stopBtn.style.display = 'none';
}
</script>
</body>
</html>
