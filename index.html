<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Camera Fast Version</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <style>
    body { margin: 0; background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #status { font-size: 22px; padding: 10px; height: 10vh; background: #1a1a1a; color: #ffff00; font-weight: bold; display: flex; align-items: center; justify-content: center; }
    .video-area { flex: 1; position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }
    .controls { height: 35vh; background: #111; display: grid; grid-template-columns: 1fr; gap: 10px; padding: 15px; box-sizing: border-box; }
    .btn { width: 100%; height: 100%; font-size: 28px; font-weight: bold; border: none; border-radius: 20px; color: white; cursor: pointer; }
    #photoBtn { background: #28a745; }
    #videoBtn { background: #dc3545; }
    #stopBtn { background: #ffc107; color: #000; display: none; }
    #startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0044cc; z-index: 999; display: flex; align-items: center; justify-content: center; text-align: center; }
    .disabled { opacity: 0.4; } /* แค่จางลงแต่ยังกดได้ */
  </style>
</head>
<body>

<div id="startOverlay" onclick="startApp()">
  <div><h1 style="font-size: 45px;">แตะเพื่อเริ่ม</h1><p style="font-size: 22px;">(TAP TO START)</p></div>
</div>

<div id="status">กรุณากดปุ่มเพื่อเริ่ม</div>

<div class="video-area">
  <video id="video" autoplay muted playsinline></video>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<div class="controls">
  <button id="photoBtn" class="btn" onclick="takePhoto()">📷 ถ่ายรูป (PHOTO)</button>
  <button id="videoBtn" class="btn" onclick="startVideoRecord()">🎥 อัดวิดีโอ (VIDEO)</button>
  <button id="stopBtn" class="btn" onclick="stopVideoRecord()">⏹ หยุดและบันทึก (STOP)</button>
</div>

<script>
const video = document.getElementById('video');
const statusText = document.getElementById('status');
const startOverlay = document.getElementById('startOverlay');
const photoBtn = document.getElementById('photoBtn');
const videoBtn = document.getElementById('videoBtn');
const stopBtn = document.getElementById('stopBtn');

let modelsLoaded = false;
let mediaRecorder;
let recordedChunks = [];
let isRecording = false;

function speak(text) {
  if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = 'th-TH';
  msg.rate = 1.2;
  window.speechSynthesis.speak(msg);
}

async function startApp() {
  startOverlay.style.display = 'none';
  statusText.innerText = "กำลังเปิดกล้อง...";
  
  try {
    // 1. เปิดกล้องทันทีเพื่อให้คนใช้งานเห็นหน้าตัวเองก่อน
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
    video.srcObject = stream;
    statusText.innerText = "กล้องพร้อมแล้ว (กำลังโหลด AI)";

    // 2. โหลด AI แบบ Background (ไม่ขัดขวางการทำงานอื่น)
    loadAI();
  } catch (err) {
    statusText.innerText = "เปิดกล้องไม่ได้";
    speak("เปิดกล้องไม่ได้ค่ะ");
  }
}

async function loadAI() {
  try {
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
    // โหลดเฉพาะโมเดลจิ๋วที่จำเป็นเท่านั้น
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    modelsLoaded = true;
    statusText.innerText = "ระบบ AI พร้อมทำงาน";
    speak("เอไอพร้อมแล้วค่ะ");
    detect();
  } catch (e) {
    statusText.innerText = "AI โหลดไม่สำเร็จ (แต่ใช้กล้องได้)";
  }
}

async function detect() {
  if (!modelsLoaded || isRecording) { setTimeout(detect, 500); return; }
  
  const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 128, scoreThreshold: 0.5 });
  const result = await faceapi.detectSingleFace(video, options);

  if (result) {
    const x = result.box.x + (result.box.width / 2);
    const w = video.videoWidth;
    if (x < w * 0.35) { statusText.innerText = "ขยับขวา"; speak("ขยับขวา"); photoBtn.classList.add('disabled'); }
    else if (x > w * 0.65) { statusText.innerText = "ขยับซ้าย"; speak("ขยับซ้าย"); photoBtn.classList.add('disabled'); }
    else { statusText.innerText = "ตรงกลางแล้ว!"; speak("ตรงกลางแล้ว"); photoBtn.classList.remove('disabled'); if(navigator.vibrate) navigator.vibrate(100); }
  } else {
    statusText.innerText = "หาใบหน้าไม่เจอ";
    photoBtn.classList.add('disabled');
  }
  setTimeout(detect, 500);
}

function takePhoto() {
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width, 0); ctx.scale(-1, 1); // แก้ภาพกลับด้าน
  ctx.drawImage(video, 0, 0);
  const link = document.createElement('a');
  link.download = `photo_${Date.now()}.jpg`;
  link.href = canvas.toDataURL('image/jpeg');
  link.click();
  speak("บันทึกรูปแล้ว");
}

function startVideoRecord() {
  isRecording = true; recordedChunks = [];
  speak("เริ่มอัดวิดีโอ");
  photoBtn.style.display = 'none'; videoBtn.style.display = 'none'; stopBtn.style.display = 'block';
  mediaRecorder = new MediaRecorder(video.srcObject);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const link = document.createElement('a');
    link.download = `video_${Date.now()}.webm`;
    link.href = URL.createObjectURL(blob);
    link.click();
    speak("บันทึกวิดีโอแล้ว");
    isRecording = false;
    stopBtn.style.display = 'none'; photoBtn.style.display = 'block'; videoBtn.style.display = 'block';
  };
  mediaRecorder.start();
}

function stopVideoRecord() { if (mediaRecorder) mediaRecorder.stop(); }
</script>
</body>
</html>
