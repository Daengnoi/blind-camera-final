<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Camera Pro - Fast Version</title>
  <!-- ใช้ Library ตัวที่เร็วที่สุด -->
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <style>
    body { margin: 0; background: #000; color: #fff; text-align: center; font-family: sans-serif; }
    #startOverlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0044cc; z-index: 999; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    #status { font-size: 22px; padding: 10px; height: 10vh; background: #1a1a1a; color: #ffff00; font-weight: bold; }
    video { width: 100%; height: 45vh; object-fit: contain; transform: scaleX(-1); background: #222; }
    
    .controls { height: 45vh; display: flex; flex-direction: column; justify-content: space-evenly; padding: 5px; }
    .btn { width: 95%; height: 75px; font-size: 24px; font-weight: bold; border: none; border-radius: 15px; color: white; margin: 0 auto; cursor: pointer; }
    
    #photoBtn { background: #28a745; }
    #videoBtn { background: #dc3545; }
    #stopBtn { background: #ffc107; color: #000; display: none; }
    
    /* สไตล์ปุ่มตอนที่ AI ยังไม่พร้อม หรือหาหน้าไม่เจอ */
    .disabled { opacity: 0.3; pointer-events: none; }
  </style>
</head>
<body>

<div id="startOverlay" onclick="startApp()">
  <h1 style="font-size: 40px;">แตะเพื่อเริ่ม<br>(TAP TO START)</h1>
</div>

<div id="status">กรุณากดปุ่มเพื่อเริ่ม</div>
<video id="video" autoplay muted playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div class="controls">
  <!-- ปุ่มจะแสดงรอไว้เลย แต่จะจางจนกว่าจะเจอหน้าตรงกลาง -->
  <button id="photoBtn" class="btn disabled" onclick="takePhoto()">📷 ถ่ายรูป</button>
  <button id="videoBtn" class="btn disabled" onclick="startVideoRecord()">🎥 อัดวิดีโอ</button>
  <button id="stopBtn" class="btn" onclick="stopVideoRecord()">⏹ หยุดและบันทึก</button>
</div>

<script>
const video = document.getElementById('video');
const statusText = document.getElementById('status');
const startOverlay = document.getElementById('startOverlay');
const photoBtn = document.getElementById('photoBtn');
const videoBtn = document.getElementById('videoBtn');
const stopBtn = document.getElementById('stopBtn');

let modelsLoaded = false;
let mediaRecorder;
let recordedChunks = [];
let isRecording = false;

function speak(text) {
  if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = 'th-TH';
  msg.rate = 1.2; 
  window.speechSynthesis.speak(msg);
}

async function startApp() {
  startOverlay.style.display = 'none';
  statusText.innerText = "เปิดกล้อง...";
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'user' }, 
      audio: true 
    });
    video.srcObject = stream;
    
    statusText.innerText = "กำลังโหลด AI...";
    // ใช้ Model ขนาดเล็กที่สุดเพื่อความเร็ว
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    modelsLoaded = true;
    
    speak("เอไอพร้อมแล้วค่ะ");
    detect();
  } catch (err) {
    statusText.innerText = "ข้อผิดพลาดกล้อง";
    speak("เปิดกล้องไม่ได้ค่ะ");
  }
}

async function detect() {
  if (!modelsLoaded || isRecording) {
    setTimeout(detect, 200);
    return;
  }

  // ปรับค่าให้ประมวลผลเบาที่สุด (inputSize: 128)
  const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 128, scoreThreshold: 0.5 });
  const result = await faceapi.detectSingleFace(video, options);

  if (result) {
    const x = result.box.x + (result.box.width / 2);
    const w = video.videoWidth;
    
    if (x < w * 0.35) { 
      statusText.innerText = "ขยับขวา";
      speak("ขยับขวา"); 
      setButtonsEnabled(false);
    } else if (x > w * 0.65) { 
      statusText.innerText = "ขยับซ้าย";
      speak("ขยับซ้าย"); 
      setButtonsEnabled(false);
    } else { 
      statusText.innerText = "ตรงกลางแล้ว!"; 
      speak("ตรงกลางแล้ว"); 
      setButtonsEnabled(true);
      if(navigator.vibrate) navigator.vibrate(100);
    }
  } else {
    statusText.innerText = "หาใบหน้าไม่เจอ";
    setButtonsEnabled(false);
  }
  setTimeout(detect, 300); // หน่วงเวลาเล็กน้อยไม่ให้เครื่องร้อน
}

function setButtonsEnabled(enabled) {
  if (enabled) {
    photoBtn.classList.remove('disabled');
    videoBtn.classList.remove('disabled');
  } else {
    photoBtn.classList.add('disabled');
    videoBtn.classList.add('disabled');
  }
}

function takePhoto() {
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0);
  
  const link = document.createElement('a');
  link.download = `photo.jpg`;
  link.href = canvas.toDataURL('image/jpeg');
  link.click();
  speak("บันทึกรูปแล้ว");
}

function startVideoRecord() {
  isRecording = true;
  recordedChunks = [];
  speak("เริ่มอัดวิดีโอ");
  photoBtn.style.display = 'none';
  videoBtn.style.display = 'none';
  stopBtn.style.display = 'block';
  
  mediaRecorder = new MediaRecorder(video.srcObject);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const link = document.createElement('a');
    link.download = `video.webm`;
    link.href = URL.createObjectURL(blob);
    link.click();
    speak("บันทึกวิดีโอแล้ว");
    isRecording = false;
    stopBtn.style.display = 'none';
    photoBtn.style.display = 'block';
    videoBtn.style.display = 'block';
  };
  mediaRecorder.start();
}

function stopVideoRecord() {
  if (mediaRecorder) mediaRecorder.stop();
}
</script>
</body>
</html>
