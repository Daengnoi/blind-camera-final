<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Camera Pro for Blind</title>
  
  <!-- โหลด AI Library -->
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  
  <style>
    body { margin: 0; background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
    /* หน้าจอเริ่มต้นเพื่อขอสิทธิ์ */
    #startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0044cc; z-index: 999; display: flex; align-items: center; justify-content: center; cursor: pointer; text-align: center; }
    
    #status { font-size: clamp(20px, 5vw, 30px); padding: 10px; height: 12vh; background: #1a1a1a; color: #ffff00; font-weight: bold; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #333; }

    .video-area { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }

    .controls { height: 35vh; background: #111; display: grid; grid-template-columns: 1fr; gap: 10px; padding: 15px; box-sizing: border-box; }
    
    .btn { width: 100%; height: 100%; font-size: clamp(24px, 6vw, 32px); font-weight: bold; border: none; border-radius: 20px; color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    
    #photoBtn { background: #28a745; }
    #videoBtn { background: #dc3545; }
    #stopBtn { background: #ffc107; color: #000; display: none; }
    
    /* ปุ่มจางลงเมื่อ AI หาหน้าไม่เจอ */
    .disabled { opacity: 0.2; pointer-events: none; }

    @media (min-width: 768px) {
      .controls { grid-template-columns: 1fr 1fr; height: 20vh; }
    }
  </style>
</head>
<body>

<div id="startOverlay" onclick="startApp()">
  <div>
    <h1 style="font-size: 45px;">แตะหน้าจอเพื่อเริ่ม</h1>
    <p style="font-size: 22px;">(TAP TO START)</p>
  </div>
</div>

<div id="status">กำลังรอระบบ...</div>

<div class="video-area">
  <video id="video" autoplay muted playsinline></video>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<div class="controls">
  <button id="photoBtn" class="btn disabled" onclick="takePhoto()">📷 ถ่ายรูป (PHOTO)</button>
  <button id="videoBtn" class="btn disabled" onclick="startVideoRecord()">🎥 อัดวิดีโอ (VIDEO)</button>
  <button id="stopBtn" class="btn" onclick="stopVideoRecord()">⏹ หยุดบันทึก (STOP)</button>
</div>

<script>
const video = document.getElementById('video');
const statusText = document.getElementById('status');
const startOverlay = document.getElementById('startOverlay');
const photoBtn = document.getElementById('photoBtn');
const videoBtn = document.getElementById('videoBtn');
const stopBtn = document.getElementById('stopBtn');

let modelsLoaded = false;
let mediaRecorder;
let recordedChunks = [];
let isRecording = false;
let noFaceCounter = 0;

function speak(text) {
  if (window.speechSynthesis.speaking && text !== "ตรงกลางแล้ว") return;
  window.speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = 'th-TH';
  msg.rate = 1.1;
  window.speechSynthesis.speak(msg);
}

async function startApp() {
  startOverlay.style.display = 'none';
  statusText.innerText = "กำลังเปิดกล้อง...";
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'user' }, audio: true 
    });
    video.srcObject = stream;
    
    statusText.innerText = "โหลด AI...";
    speak("กำลังโหลดเอไอค่ะ");
    
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    modelsLoaded = true;
    
    speak("เอไอพร้อมแล้ว ส่องกล้องมาที่หน้าได้เลยค่ะ");
    detect();
  } catch (err) {
    statusText.innerText = "เข้าถึงกล้องไม่ได้";
    speak("เปิดกล้องไม่ได้ โปรดอนุญาตสิทธิ์ค่ะ");
  }
}

async function detect() {
  if (!modelsLoaded || isRecording) {
    setTimeout(detect, 200);
    return;
  }

  const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.5 });
  const result = await faceapi.detectSingleFace(video, options);

  if (result) {
    noFaceCounter = 0;
    const x = result.box.x + (result.box.width / 2);
    const w = video.videoWidth;
    
    if (x < w * 0.35) { 
      statusText.innerText = "ขยับขวา"; speak("ขยับขวา"); 
      setButtonsEnabled(false);
    } else if (x > w * 0.65) { 
      statusText.innerText = "ขยับซ้าย"; speak("ขยับซ้าย"); 
      setButtonsEnabled(false);
    } else { 
      statusText.innerText = "ตรงกลางแล้ว"; speak("ตรงกลางแล้ว"); 
      setButtonsEnabled(true);
      if(navigator.vibrate) navigator.vibrate(100);
    }
  } else {
    noFaceCounter++;
    if (noFaceCounter > 5) {
      statusText.innerText = "ไม่พบใบหน้า";
      speak("ไม่พบใบหน้าค่ะ");
      noFaceCounter = 0;
    }
    setButtonsEnabled(false);
  }
  setTimeout(detect, 400);
}

function setButtonsEnabled(enabled) {
  if (enabled) {
    photoBtn.classList.remove('disabled');
    videoBtn.classList.remove('disabled');
  } else {
    photoBtn.classList.add('disabled');
    videoBtn.classList.add('disabled');
  }
}

function takePhoto() {
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0);
  const link = document.createElement('a');
  link.download = `photo_${Date.now()}.jpg`;
  link.href = canvas.toDataURL('image/jpeg');
  link.click();
  speak("บันทึกรูปภาพแล้ว");
}

function startVideoRecord() {
  isRecording = true;
  recordedChunks = [];
  speak("เริ่มอัดวิดีโอ");
  photoBtn.style.display = 'none';
  videoBtn.style.display = 'none';
  stopBtn.style.display = 'block';
  
  mediaRecorder = new MediaRecorder(video.srcObject);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const link = document.createElement('a');
    link.download = `video_${Date.now()}.webm`;
    link.href = URL.createObjectURL(blob);
    link.click();
    speak("บันทึกวิดีโอแล้ว");
    isRecording = false;
    stopBtn.style.display = 'none';
    photoBtn.style.display = 'block';
    videoBtn.style.display = 'block';
  };
  mediaRecorder.start();
}

function stopVideoRecord() {
  if (mediaRecorder) mediaRecorder.stop();
}
</script>
</body>
</html>
