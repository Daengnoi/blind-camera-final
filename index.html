<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Voice Camera Pro - Final</title>
  
  <!-- Library AI ตัวเสถียรที่สุด -->
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  
  <style>
    body { margin: 0; background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
    /* หน้าจอเริ่มต้นขนาดใหญ่พิเศษ */
    #startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0044cc; z-index: 999; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    
    #status { font-size: clamp(22px, 5vw, 32px); padding: 15px; height: 12vh; background: #1a1a1a; color: #ffff00; font-weight: bold; display: flex; align-items: center; justify-content: center; border-bottom: 3px solid #333; line-height: 1.2; }

    .video-area { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; position: relative; }
    video { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }

    .controls { height: 35vh; background: #111; display: grid; grid-template-columns: 1fr; gap: 15px; padding: 20px; box-sizing: border-box; }
    
    .btn { width: 100%; height: 100%; font-size: clamp(24px, 6vw, 35px); font-weight: bold; border: none; border-radius: 25px; color: white; cursor: pointer; box-shadow: 0 6px 15px rgba(0,0,0,0.6); transition: 0.2s; }
    .btn:active { transform: scale(0.95); }

    #photoBtn { background: #28a745; }
    #videoBtn { background: #dc3545; }
    #stopBtn { background: #ffc107; color: #000; display: none; }
    
    .disabled { opacity: 0.15; pointer-events: none; filter: grayscale(100%); }

    /* ปรับแต่งสำหรับ PC */
    @media (min-width: 768px) { .controls { grid-template-columns: 1fr 1fr; height: 22vh; } }
  </style>
</head>
<body>

<div id="startOverlay" onclick="startApp()">
  <div style="padding: 20px;">
    <h1 style="font-size: 50px; margin-bottom: 10px;">แตะเพื่อเริ่ม</h1>
    <p style="font-size: 24px;">(TAP TO START)</p>
  </div>
</div>

<div id="status">กำลังรอเปิดระบบ...</div>

<div class="video-area">
  <video id="video" autoplay muted playsinline></video>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<div class="controls">
  <button id="photoBtn" class="btn disabled" onclick="takePhoto()">📷 ถ่ายรูป (Photo)</button>
  <button id="videoBtn" class="btn disabled" onclick="startVideoRecord()">🎥 อัดวิดีโอ (Video)</button>
  <button id="stopBtn" class="btn" onclick="stopVideoRecord()">⏹ หยุดและบันทึก (Stop)</button>
</div>

<script>
const video = document.getElementById('video');
const statusText = document.getElementById('status');
const startOverlay = document.getElementById('startOverlay');
const photoBtn = document.getElementById('photoBtn');
const videoBtn = document.getElementById('videoBtn');
const stopBtn = document.getElementById('stopBtn');

let modelsLoaded = false;
let mediaRecorder;
let recordedChunks = [];
let isRecording = false;
let noFaceCounter = 0;

function speak(text) {
  if (window.speechSynthesis.speaking && text === statusText.innerText) return;
  window.speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = 'th-TH';
  msg.rate = 1.1;
  window.speechSynthesis.speak(msg);
}

async function startApp() {
  startOverlay.style.display = 'none';
  statusText.innerText = "กำลังขอกล้อง...";
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }, 
      audio: true 
    });
    video.srcObject = stream;
    
    statusText.innerText = "กำลังโหลดเอไอ...";
    speak("กำลังโหลดเอไอค่ะ");
    
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    modelsLoaded = true;
    
    speak("เอไอพร้อมแล้ว ส่องกล้องมาที่หน้าได้เลยค่ะ");
    detect();
  } catch (err) {
    statusText.innerHTML = "เข้าถึงกล้องไม่ได้<br>โปรดกดอนุญาตสิทธิ์กล้อง";
    speak("เปิดกล้องไม่ได้ค่ะ โปรดกดอนุญาตสิทธิ์การใช้กล้องที่ข้างชื่อเว็บไซต์ค่ะ");
  }
}

async function detect() {
  if (!modelsLoaded || isRecording) {
    setTimeout(detect, 200);
    return;
  }

  const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 128, scoreThreshold: 0.5 });
  const result = await faceapi.detectSingleFace(video, options);

  if (result) {
    noFaceCounter = 0;
    const x = result.box.x + (result.box.width / 2);
    const w = video.videoWidth;
    
    if (x < w * 0.35) { 
      updateStatus("ขยับขวา", "ขยับขวา", false);
    } else if (x > w * 0.65) { 
      updateStatus("ขยับซ้าย", "ขยับซ้าย", false);
    } else { 
      updateStatus("ตรงกลางแล้ว", "ตรงกลางแล้ว", true);
      if(navigator.vibrate) navigator.vibrate(100);
    }
  } else {
    noFaceCounter++;
    if (noFaceCounter > 4) {
      updateStatus("ไม่พบใบหน้า", "ไม่พบใบหน้าค่ะ", false);
      noFaceCounter = 0;
    }
  }
  setTimeout(detect, 400);
}

function updateStatus(text, speech, enabled) {
  statusText.innerText = text;
  speak(speech);
  const op = enabled ? 'remove' : 'add';
  photoBtn.classList[op]('disabled');
  videoBtn.classList[op]('disabled');
}

function takePhoto() {
  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0);
  
  const link = document.createElement('a');
  link.download = `photo_${Date.now()}.jpg`;
  link.href = canvas.toDataURL('image/jpeg', 0.9);
  link.click();
  speak("บันทึกรูปภาพเรียบร้อยค่ะ");
}

function startVideoRecord() {
  isRecording = true;
  recordedChunks = [];
  speak("เริ่มอัดวิดีโอ");
  
  photoBtn.style.display = 'none';
  videoBtn.style.display = 'none';
  stopBtn.style.display = 'block';
  
  mediaRecorder = new MediaRecorder(video.srcObject);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const link = document.createElement('a');
    link.download = `video_${Date.now()}.webm`;
    link.href = URL.createObjectURL(blob);
    link.click();
    speak("บันทึกวิดีโอเรียบร้อยค่ะ");
    
    isRecording = false;
    stopBtn.style.display = 'none';
    photoBtn.style.display = 'block';
    videoBtn.style.display = 'block';
  };
  mediaRecorder.start();
}

function stopVideoRecord() {
  if (mediaRecorder) mediaRecorder.stop();
}
</script>
</body>
</html>
