<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>กล้องเสียงนำทาง | Voice-Guided Camera</title>
<style>
  :root{
    --bg:#000000;
    --green:#00E676;
    --green-dark:#00A854;
    --yellow:#FFD600;
    --yellow-dark:#C7A600;
    --text:#FFFFFF;
    --danger:#FF5252;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; height:100%; width:100%;
    background:var(--bg); color:var(--text);
    font-family:"Noto Sans Thai","Segoe UI",Arial,sans-serif;
    overflow:hidden;
  }
  body{
    display:flex; flex-direction:column;
    height:100vh; height:100dvh;
  }

  /* ---------- Video layer ---------- */
  #cameraWrap{
    position:relative; flex:1; width:100%; overflow:hidden;
    background:#000;
  }
  #video{
    position:absolute; top:50%; left:50%;
    width:100%; height:100%; object-fit:cover;
    transform:translate(-50%,-50%) scaleX(-1); /* mirrored preview */
  }
  #canvas{ display:none; }

  /* Face guide ring (visual aid for low-vision users, not just blind users) */
  #faceRing{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:55vmin; height:55vmin; max-width:340px; max-height:340px;
    border:6px solid var(--yellow);
    border-radius:50%;
    pointer-events:none;
    opacity:0.65;
  }

  /* ---------- Status bar ---------- */
  #status{
    position:absolute; top:0; left:0; right:0;
    padding:14px 16px;
    font-size:clamp(20px,5.5vw,30px);
    font-weight:700;
    text-align:center;
    background:rgba(0,0,0,0.55);
    min-height:1.4em;
  }
  #status.centered{ color:var(--green); }
  #status.left, #status.right{ color:var(--yellow); }
  #status.none{ color:var(--text); }

  /* ---------- Start overlay ---------- */
  #startOverlay{
    position:fixed; inset:0; z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:28px;
    background:var(--bg);
    padding:24px; text-align:center;
  }
  #startOverlay h1{
    font-size:clamp(24px,7vw,40px);
    margin:0 0 4px 0;
  }
  #startOverlay p{
    font-size:clamp(16px,4.5vw,22px);
    color:#ddd;
    max-width:520px;
    line-height:1.5;
    margin:0;
  }
  #startBtn{
    width:min(80vw,340px); height:min(80vw,340px);
    border-radius:50%;
    border:8px solid var(--green-dark);
    background:var(--green);
    color:#00250f;
    font-size:clamp(28px,8vw,44px);
    font-weight:900;
    cursor:pointer;
  }
  #startBtn:focus-visible, .bigBtn:focus-visible{
    outline:6px solid var(--yellow);
    outline-offset:4px;
  }

  /* ---------- Bottom control bar ---------- */
  #controls{
    display:flex; gap:14px;
    padding:16px; padding-bottom:max(16px, env(safe-area-inset-bottom));
    background:#000;
  }
  .bigBtn{
    flex:1;
    min-height:96px;
    border-radius:20px;
    border:5px solid #000;
    font-size:clamp(20px,5vw,28px);
    font-weight:800;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    gap:10px;
    line-height:1.2;
    transition:transform 0.08s ease;
  }
  .bigBtn:active{ transform:scale(0.96); }
  .bigBtn[disabled]{
    opacity:0; visibility:hidden; pointer-events:none;
  }
  #btnPhoto{ background:var(--green); color:#00250f; }
  #btnRecord{ background:var(--yellow); color:#2b2200; }
  #btnRecord.recording{
    background:var(--danger); color:#2b0000;
  }
  .icon{ font-size:1.3em; }

  #flash{
    position:fixed; inset:0; background:#fff; opacity:0;
    pointer-events:none; z-index:60;
  }
  #flash.on{ opacity:0.85; transition:opacity 0.4s ease; }

  .sr-only{
    position:absolute; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }
</style>
</head>
<body>

  <!-- Start / permission overlay -->
  <div id="startOverlay" role="dialog" aria-label="เริ่มต้นใช้งานกล้อง">
    <h1>กล้องเสียงนำทาง</h1>
    <p>แอปนี้จะพูดบอกทิศทางเป็นภาษาไทยเพื่อช่วยจัดใบหน้าให้อยู่กึ่งกลางภาพ กดปุ่มด้านล่างเพื่อเริ่มต้นและอนุญาตให้ใช้กล้องกับไมโครโฟน</p>
    <button id="startBtn" aria-label="เริ่มต้น เปิดกล้องและเสียง">เริ่มต้น<br>START</button>
  </div>

  <div id="cameraWrap" hidden>
    <video id="video" autoplay playsinline muted></video>
    <div id="faceRing" hidden></div>
    <canvas id="canvas"></canvas>
    <div id="status" class="none" role="status" aria-live="polite">กำลังค้นหาใบหน้า...</div>
  </div>

  <div id="controls" hidden>
    <button id="btnPhoto" class="bigBtn" disabled aria-label="ถ่ายภาพ">
      <span class="icon" aria-hidden="true">📷</span> ถ่ายภาพ
    </button>
    <button id="btnRecord" class="bigBtn" disabled aria-label="เริ่มบันทึกวิดีโอ">
      <span class="icon" aria-hidden="true">⏺</span> บันทึกวิดีโอ
    </button>
  </div>

  <div id="flash"></div>
  <div id="liveMsg" class="sr-only" role="status" aria-live="assertive"></div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
(function(){
  "use strict";

  const MODEL_URL = "https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights";
  const CENTER_THRESHOLD = 0.09; // fraction of video width tolerance for "centered"

  const startOverlay = document.getElementById("startOverlay");
  const startBtn      = document.getElementById("startBtn");
  const cameraWrap    = document.getElementById("cameraWrap");
  const controls      = document.getElementById("controls");
  const video          = document.getElementById("video");
  const canvas         = document.getElementById("canvas");
  const faceRing       = document.getElementById("faceRing");
  const statusEl       = document.getElementById("status");
  const liveMsg        = document.getElementById("liveMsg");
  const btnPhoto       = document.getElementById("btnPhoto");
  const btnRecord      = document.getElementById("btnRecord");
  const flashEl        = document.getElementById("flash");

  let stream = null;
  let modelsReady = false;
  let detectLoopHandle = null;
  let lastSpokenState = null;
  let lastSpokenTime = 0;
  let wasFaceDetected = false;
  let mediaRecorder = null;
  let recordedChunks = [];
  let isRecording = false;

  /* ---------------- Speech ---------------- */
  function speak(text, { force = false } = {}){
    if(!("speechSynthesis" in window)) return;
    if(!force && text === lastSpokenState && (Date.now() - lastSpokenTime) < 2200) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = "th-TH";
    utt.rate = 0.95;
    utt.pitch = 1;
    window.speechSynthesis.speak(utt);
    lastSpokenState = text;
    lastSpokenTime = Date.now();
    liveMsg.textContent = text;
  }

  function unlockSpeech(){
    // iOS/Safari require an utterance triggered directly from a user gesture to unlock TTS
    const unlockUtt = new SpeechSynthesisUtterance(" ");
    unlockUtt.volume = 1;
    window.speechSynthesis.speak(unlockUtt);
  }

  function vibrate(pattern){
    if("vibrate" in navigator){
      try{ navigator.vibrate(pattern); }catch(e){ /* no-op */ }
    }
  }

  /* ---------------- Camera + models setup ---------------- */
  async function loadModels(){
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    modelsReady = true;
  }

  async function startCamera(){
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: true
    });
    video.srcObject = stream;
    await new Promise(resolve => {
      video.onloadedmetadata = () => { video.play(); resolve(); };
    });
  }

  startBtn.addEventListener("click", async () => {
    unlockSpeech();
    startBtn.disabled = true;
    startBtn.textContent = "กำลังเปิดกล้อง...";
    try{
      await startCamera();
      startOverlay.hidden = true;
      cameraWrap.hidden = false;
      controls.hidden = false;
      speak("กล้องพร้อมแล้ว กำลังค้นหาใบหน้า", { force:true });
      loadModels().then(() => {
        beginDetectionLoop();
      }).catch(err => {
        console.error(err);
        speak("ไม่สามารถโหลดระบบตรวจจับใบหน้าได้", { force:true });
      });
    }catch(err){
      console.error(err);
      startBtn.disabled = false;
      startBtn.textContent = "เริ่มต้น / START";
      alert("ไม่สามารถเข้าถึงกล้องหรือไมโครโฟนได้ กรุณาอนุญาตการเข้าถึงแล้วลองใหม่\n(Could not access camera/microphone. Please allow permissions and try again.)");
    }
  });

  /* ---------------- Detection loop ---------------- */
  function beginDetectionLoop(){
    if(detectLoopHandle) clearInterval(detectLoopHandle);
    detectLoopHandle = setInterval(runDetection, 350);
  }

  async function runDetection(){
    if(!modelsReady || video.paused || video.videoWidth === 0) return;

    let detection;
    try{
      detection = await faceapi.detectSingleFace(
        video,
        new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 })
      );
    }catch(e){
      return;
    }

    if(detection){
      if(!wasFaceDetected){
        wasFaceDetected = true;
        btnPhoto.disabled = false;
        btnRecord.disabled = false;
        faceRing.hidden = false;
      }
      handleFacePosition(detection.box, video.videoWidth);
    } else {
      if(wasFaceDetected){
        wasFaceDetected = false;
        btnPhoto.disabled = true;
        if(!isRecording) btnRecord.disabled = true;
        faceRing.hidden = true;
      }
      statusEl.className = "none";
      statusEl.textContent = "กำลังค้นหาใบหน้า...";
      speak("ไม่พบใบหน้า กรุณาหันหน้าเข้ากล้อง");
    }
  }

  function handleFacePosition(box, videoWidth){
    // Raw detection box is on the UN-mirrored frame.
    // The preview is mirrored (like looking in a mirror), so convert
    // the raw center into "mirrored" space to match the user's own
    // sense of left/right as they face the camera.
    const rawCenterX = box.x + box.width / 2;
    const mirroredCenterX = videoWidth - rawCenterX;
    const mid = videoWidth / 2;
    const offset = (mirroredCenterX - mid) / videoWidth; // -0.5 .. 0.5

    if(offset < -CENTER_THRESHOLD){
      statusEl.className = "left";
      statusEl.textContent = "ขยับขวา (Move Right)";
      speak("ขยับขวา");
    } else if(offset > CENTER_THRESHOLD){
      statusEl.className = "right";
      statusEl.textContent = "ขยับซ้าย (Move Left)";
      speak("ขยับซ้าย");
    } else {
      statusEl.className = "centered";
      statusEl.textContent = "ตรงกลางแล้ว ถ่ายได้ (Centered)";
      if(lastSpokenState !== "ตรงกลางแล้ว ถ่ายได้"){
        vibrate(200);
      }
      speak("ตรงกลางแล้ว ถ่ายได้");
    }
  }

  /* ---------------- Take Photo ---------------- */
  btnPhoto.addEventListener("click", () => {
    if(video.videoWidth === 0) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    // Draw mirrored so the saved photo matches what the user experienced on screen
    ctx.save();
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    flashEl.classList.add("on");
    setTimeout(() => flashEl.classList.remove("on"), 250);
    vibrate(80);

    canvas.toBlob(blob => {
      if(!blob) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "photo_" + timestamp() + ".jpg";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
      speak("ถ่ายภาพเรียบร้อยแล้ว", { force:true });
    }, "image/jpeg", 0.92);
  });

  /* ---------------- Record Video ---------------- */
  btnRecord.addEventListener("click", () => {
    if(!isRecording){
      startRecording();
    } else {
      stopRecording();
    }
  });

  function pickMimeType(){
    const candidates = [
      "video/webm;codecs=vp9,opus",
      "video/webm;codecs=vp8,opus",
      "video/webm"
    ];
    for(const type of candidates){
      if(window.MediaRecorder && MediaRecorder.isTypeSupported(type)) return type;
    }
    return "";
  }

  function startRecording(){
    if(!stream) return;
    recordedChunks = [];
    const mimeType = pickMimeType();
    try{
      mediaRecorder = mimeType
        ? new MediaRecorder(stream, { mimeType })
        : new MediaRecorder(stream);
    }catch(e){
      speak("ไม่สามารถเริ่มบันทึกวิดีโอได้", { force:true });
      return;
    }

    mediaRecorder.ondataavailable = e => {
      if(e.data && e.data.size > 0) recordedChunks.push(e.data);
    };
    mediaRecorder.onstop = saveRecording;

    mediaRecorder.start();
    isRecording = true;
    btnRecord.classList.add("recording");
    btnRecord.setAttribute("aria-label", "หยุดบันทึกวิดีโอ");
    btnRecord.innerHTML = '<span class="icon" aria-hidden="true">⏹</span> หยุดบันทึก';
    vibrate([80,50,80]);
    speak("เริ่มบันทึกวิดีโอแล้ว", { force:true });
  }

  function stopRecording(){
    if(mediaRecorder && mediaRecorder.state !== "inactive"){
      mediaRecorder.stop();
    }
    isRecording = false;
    btnRecord.classList.remove("recording");
    btnRecord.setAttribute("aria-label", "เริ่มบันทึกวิดีโอ");
    btnRecord.innerHTML = '<span class="icon" aria-hidden="true">⏺</span> บันทึกวิดีโอ';
    if(!wasFaceDetected) btnRecord.disabled = true;
    vibrate(120);
  }

  function saveRecording(){
    if(recordedChunks.length === 0) return;
    const blob = new Blob(recordedChunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "video_" + timestamp() + ".webm";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 6000);
    speak("บันทึกวิดีโอเรียบร้อยแล้ว", { force:true });
  }

  function timestamp(){
    const d = new Date();
    const pad = n => String(n).padStart(2,"0");
    return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
  }

  /* Clean up on page hide */
  window.addEventListener("pagehide", () => {
    if(stream){
      stream.getTracks().forEach(t => t.stop());
    }
    if(detectLoopHandle) clearInterval(detectLoopHandle);
  });

})();
</script>
</body>
</html>
